name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests-minimum:
    runs-on: ubuntu-latest
    name: Tests (Python 3.12)

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run CLI smoke check
        run: python -m immich_doctor --help

  tests-latest:
    runs-on: ubuntu-latest
    name: Tests (Python 3.13)

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Run CLI smoke check
        run: python -m immich_doctor runtime health check --output json
