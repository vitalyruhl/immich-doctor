name: Project Default Status Hygiene

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, reopened]
  schedule:
    - cron: "0 21 * * 6,0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Evaluate only and do not change project state"
        required: false
        type: boolean
        default: true
      project_owner:
        description: "GitHub user or organization that owns the project"
        required: false
        type: string
      project_title:
        description: "Optional Projects v2 title override"
        required: false
        type: string
      project_number:
        description: "Projects v2 number override"
        required: false
        type: string

concurrency:
  group: project-default-status-hygiene-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  issues: write
  pull-requests: write
  repository-projects: write

jobs:
  hygiene:
    runs-on: ubuntu-latest
    name: Backfill Empty Status to Planned

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve mode and content scope
        id: mode
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.dry_run }}" == "true" ]]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
          fi

          content_url=""
          if [[ "${{ github.event_name }}" == "issues" ]]; then
            content_url="${{ github.event.issue.html_url }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            content_url="${{ github.event.pull_request.html_url }}"
          fi
          echo "content_url=$content_url" >> "$GITHUB_OUTPUT"

      - name: Run default status hygiene
        env:
          PROJECT_STATUS_AUDIT_TOKEN: ${{ secrets.PROJECT_STATUS_AUDIT_TOKEN || github.token }}
          PROJECT_STATUS_AUDIT_OWNER: ${{ inputs.project_owner || vars.PROJECT_STATUS_AUDIT_OWNER || github.repository_owner }}
          PROJECT_STATUS_AUDIT_PROJECT_TITLE: ${{ inputs.project_title || vars.PROJECT_STATUS_AUDIT_TITLE || 'Backup-Doctor Projekt' }}
          PROJECT_STATUS_AUDIT_PROJECT_NUMBER: ${{ inputs.project_number || vars.PROJECT_STATUS_AUDIT_NUMBER || '3' }}
          PROJECT_STATUS_AUDIT_DRY_RUN: ${{ steps.mode.outputs.dry_run }}
          PROJECT_STATUS_AUDIT_CONTENT_URL: ${{ steps.mode.outputs.content_url }}
        run: python scripts/project_default_status_hygiene.py --repo "${{ github.repository }}"
