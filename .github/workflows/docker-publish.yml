name: Docker Publish

on:
  push:
    branches:
      - main
      - feature/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vitalyruhl/immich-doctor

jobs:
  publish:
    name: Build And Publish GHCR Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=db,enable=${{ github.ref == 'refs/heads/feature/db' }}
            type=raw,value=rt,enable=${{ github.ref == 'refs/heads/feature/runtime-integrity' }}
            type=sha,format=short
            type=ref,event=branch
          labels: |
            org.opencontainers.image.title=immich-doctor
            org.opencontainers.image.description=Safe validation and maintenance tooling for Immich
            org.opencontainers.image.vendor=vitalyruhl

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
