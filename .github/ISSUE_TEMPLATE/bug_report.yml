name: Bug report
description: Report a reproducible bug or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue.
        For potentially destructive or security-sensitive issues, do not publish secrets.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps, commands, and sample paths if relevant.
      placeholder: |
        1. Run ...
        2. Configure ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: immich_version
    attributes:
      label: Immich version
      description: Which Immich version are you using?
      placeholder: "e.g. 1.130.3"
  - type: dropdown
    id: deployment_type
    attributes:
      label: Deployment type
      options:
        - Docker Compose
        - Unraid
        - Bare metal
        - Other
  - type: dropdown
    id: safety_impact
    attributes:
      label: Safety impact
      description: Could this issue affect data safety?
      options:
        - No known data risk
        - Possible report accuracy issue
        - Possible destructive behavior risk
        - Security-sensitive
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and output
      description: Paste relevant command output. Redact secrets.
      render: text

