name: ${TESTBED_PROJECT_NAME:-immich-doctor-testbed}

services:
  postgres:
    image: ${TESTBED_POSTGRES_IMAGE:-ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0}
    restart: unless-stopped
    ports:
      - "${TESTBED_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${TESTBED_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TESTBED_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${TESTBED_DB_NAME:-immich}
      POSTGRES_INITDB_ARGS: --data-checksums
    shm_size: 128mb
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - immich_dev_pgdata:/var/lib/postgresql/data

  immich-doctor:
    profiles:
      - doctor
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: runtime
    image: ${TESTBED_IMMICH_DOCTOR_IMAGE:-immich-doctor:testbed-runtime}
    ports:
      - "${TESTBED_DOCTOR_PORT:-8000}:8000"
    environment:
      IMMICH_DOCTOR_ENVIRONMENT: dev-testbed
      IMMICH_STORAGE_PATH: /mnt/immich/storage
      IMMICH_UPLOADS_PATH: /mnt/immich/storage/upload
      IMMICH_THUMBS_PATH: /mnt/immich/storage/thumbs
      IMMICH_PROFILE_PATH: /mnt/immich/storage/profile
      IMMICH_VIDEO_PATH: /mnt/immich/storage/encoded-video
      REPORTS_PATH: /data/reports
      MANIFESTS_PATH: /data/manifests
      QUARANTINE_PATH: /data/quarantine
      LOG_PATH: /data/logs
      TMP_PATH: /data/tmp
      CONFIG_PATH: /config
      MISSING_ASSET_SCAN_CONCURRENCY: ${MISSING_ASSET_SCAN_CONCURRENCY:-20}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${TESTBED_DB_NAME:-immich}
      DB_USER: ${TESTBED_DB_USER:-postgres}
      DB_PASSWORD: ${TESTBED_DB_PASSWORD:-postgres}
      DB_CONNECT_TIMEOUT_SECONDS: 5
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${TESTBED_MOCK_STORAGE_PATH:-../../data/mock/immich-library}:/mnt/immich/storage:ro
      - ${TESTBED_REPORTS_PATH:-../../data/reports}:/data/reports
      - ${TESTBED_MANIFESTS_PATH:-../../data/manifests}:/data/manifests
      - ${TESTBED_QUARANTINE_PATH:-../../data/quarantine}:/data/quarantine
      - ${TESTBED_LOG_PATH:-../../data/logs}:/data/logs
      - ${TESTBED_TMP_PATH:-../../data/tmp}:/data/tmp
      - ${TESTBED_CONFIG_PATH:-../../config}:/config

  immich-doctor-shell:
    profiles:
      - doctor-shell
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: dev
    working_dir: /workspace
    environment:
      UV_PROJECT_ENVIRONMENT: /tmp/immich-doctor-venv
      UV_CACHE_DIR: /tmp/uv-cache
      IMMICH_DOCTOR_ENVIRONMENT: dev-testbed-shell
      IMMICH_STORAGE_PATH: /mnt/immich/storage
      IMMICH_UPLOADS_PATH: /mnt/immich/storage/upload
      IMMICH_THUMBS_PATH: /mnt/immich/storage/thumbs
      IMMICH_PROFILE_PATH: /mnt/immich/storage/profile
      IMMICH_VIDEO_PATH: /mnt/immich/storage/encoded-video
      REPORTS_PATH: /data/reports
      MANIFESTS_PATH: /data/manifests
      QUARANTINE_PATH: /data/quarantine
      LOG_PATH: /data/logs
      TMP_PATH: /data/tmp
      CONFIG_PATH: /config
      MISSING_ASSET_SCAN_CONCURRENCY: ${MISSING_ASSET_SCAN_CONCURRENCY:-20}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${TESTBED_DB_NAME:-immich}
      DB_USER: ${TESTBED_DB_USER:-postgres}
      DB_PASSWORD: ${TESTBED_DB_PASSWORD:-postgres}
      DB_CONNECT_TIMEOUT_SECONDS: 5
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../..:/workspace
      - ${TESTBED_MOCK_STORAGE_PATH:-../../data/mock/immich-library}:/mnt/immich/storage:ro
      - ${TESTBED_REPORTS_PATH:-../../data/reports}:/data/reports
      - ${TESTBED_MANIFESTS_PATH:-../../data/manifests}:/data/manifests
      - ${TESTBED_QUARANTINE_PATH:-../../data/quarantine}:/data/quarantine
      - ${TESTBED_LOG_PATH:-../../data/logs}:/data/logs
      - ${TESTBED_TMP_PATH:-../../data/tmp}:/data/tmp
      - ${TESTBED_CONFIG_PATH:-../../config}:/config
    command:
      - sh
      - -c
      - |
        echo "immich-doctor shell container ready. Example:"
        echo "  uv run python -m immich_doctor consistency validate"
        tail -f /dev/null

volumes:
  immich_dev_pgdata:
    name: ${TESTBED_DB_VOLUME:-immich_dev_pgdata}
  immich_dev_pgdata_snapshot:
    name: ${TESTBED_DB_SNAPSHOT_VOLUME:-immich_dev_pgdata_snapshot}
