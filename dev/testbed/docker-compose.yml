name: ${TESTBED_PROJECT_NAME:-immich-doctor-testbed}

services:
  postgres:
    image: ${TESTBED_POSTGRES_IMAGE:-ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0}
    restart: unless-stopped
    ports:
      - "${TESTBED_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${TESTBED_DB_USER:-postgres}
      POSTGRES_PASSWORD: ${TESTBED_DB_PASSWORD:-postgres}
      POSTGRES_DB: ${TESTBED_DB_NAME:-immich}
      POSTGRES_INITDB_ARGS: --data-checksums
    shm_size: 128mb
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready --dbname="$${POSTGRES_DB}" --username="$${POSTGRES_USER}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - immich_dev_pgdata:/var/lib/postgresql/data

  immich-doctor:
    profiles:
      - doctor
    build:
      context: ../..
      dockerfile: docker/Dockerfile
      target: runtime
    image: ${TESTBED_IMMICH_DOCTOR_IMAGE:-immich-doctor:local}
    user: root
    privileged: true
    entrypoint:
      - /usr/local/bin/immich-doctor-real-storage-entrypoint
    command:
      - uvicorn
      - immich_doctor.api:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    restart: unless-stopped
    ports:
      - "${TESTBED_DOCTOR_PORT:-8000}:8000"
    environment:
      IMMICH_DOCTOR_ENVIRONMENT: dev-testbed
      IMMICH_STORAGE_PATH: /mnt/immich/storage
      IMMICH_UPLOADS_PATH: /mnt/immich/storage/upload
      IMMICH_THUMBS_PATH: /mnt/immich/storage/thumbs
      IMMICH_PROFILE_PATH: /mnt/immich/storage/profile
      IMMICH_VIDEO_PATH: /mnt/immich/storage/encoded-video
      REPORTS_PATH: /data/reports
      MANIFESTS_PATH: /data/manifests
      QUARANTINE_PATH: /data/quarantine
      LOG_PATH: /data/logs
      TMP_PATH: /data/tmp
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${TESTBED_DB_NAME:-immich}
      DB_USER: ${TESTBED_DB_USER:-postgres}
      DB_PASSWORD: ${TESTBED_DB_PASSWORD:-postgres}
      DB_CONNECT_TIMEOUT_SECONDS: 5
      TESTBED_INIT_MODE: ${TESTBED_INIT_MODE:-FROM_DUMP}
      TESTBED_DUMP_PATH: ${TESTBED_DUMP_PATH:-}
      TESTBED_DUMP_FORMAT: ${TESTBED_DUMP_FORMAT:-auto}
      TESTBED_AUTO_IMPORT_ON_EMPTY: ${TESTBED_AUTO_IMPORT_ON_EMPTY:-true}
      TESTBED_DUMP_MOUNT_SOURCE: ${TESTBED_DUMP_MOUNT_SOURCE:-./tmp}
      TESTBED_CONTAINER_DUMP_DIR: /mnt/testbed/dumps
      TESTBED_STORAGE_SOURCE_MODE: ${TESTBED_STORAGE_SOURCE_MODE:-mock}
      TESTBED_REAL_STORAGE_MODE: ${TESTBED_REAL_STORAGE_MODE:-host-bind}
      TESTBED_REAL_STORAGE_SMB_SOURCE: ${TESTBED_REAL_STORAGE_SMB_SOURCE:-}
      TESTBED_REAL_STORAGE_SMB_USERNAME: ${TESTBED_REAL_STORAGE_SMB_USERNAME:-}
      TESTBED_REAL_STORAGE_SMB_PASSWORD: ${TESTBED_REAL_STORAGE_SMB_PASSWORD:-}
      TESTBED_REAL_STORAGE_SMB_VERS: ${TESTBED_REAL_STORAGE_SMB_VERS:-3.0}
      TESTBED_REAL_STORAGE_SMB_DOMAIN: ${TESTBED_REAL_STORAGE_SMB_DOMAIN:-}
      TESTBED_REAL_STORAGE_SMB_UID: ${TESTBED_REAL_STORAGE_SMB_UID:-1000}
      TESTBED_REAL_STORAGE_SMB_GID: ${TESTBED_REAL_STORAGE_SMB_GID:-1000}
      IMMICH_DOCTOR_CATALOG_SCAN_WORKERS: ${TESTBED_CATALOG_SCAN_WORKERS:-4}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ${TESTBED_SELECTED_STORAGE_PATH:-../../data/mock/immich-library}:${TESTBED_BIND_STORAGE_TARGET:-/mnt/immich/storage}:ro
      - ${TESTBED_DUMP_MOUNT_SOURCE:-./tmp}:/mnt/testbed/dumps:ro
      - ${TESTBED_REPORTS_PATH:-../../data/reports}:/data/reports
      - ${TESTBED_MANIFESTS_PATH:-../../data/manifests}:/data/manifests
      - ${TESTBED_QUARANTINE_PATH:-../../data/quarantine}:/data/quarantine
      - ${TESTBED_LOG_PATH:-../../data/logs}:/data/logs
      - ${TESTBED_TMP_PATH:-../../data/tmp}:/data/tmp
      - ${TESTBED_CONFIG_PATH:-../../config}:/config:ro

volumes:
  immich_dev_pgdata:
    name: ${TESTBED_DB_VOLUME:-immich_dev_pgdata}
  immich_dev_pgdata_snapshot:
    name: ${TESTBED_DB_SNAPSHOT_VOLUME:-immich_dev_pgdata_snapshot}
