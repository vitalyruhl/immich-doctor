name: immich-doctor-local

services:
  immich-doctor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    image: immich-doctor:local
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    security_opt:
      - no-new-privileges:true
    environment:
      UMASK: ${UMASK:-002}
      IMMICH_DOCTOR_ENVIRONMENT: docker-local
      IMMICH_STORAGE_PATH: /mnt/immich/storage
      IMMICH_UPLOADS_PATH: /mnt/immich/storage/upload
      IMMICH_THUMBS_PATH: /mnt/immich/storage/thumbs
      IMMICH_PROFILE_PATH: /mnt/immich/storage/profile
      IMMICH_VIDEO_PATH: /mnt/immich/storage/encoded-video
      BACKUP_TARGET_PATH: /mnt/backups/immich
      REPORTS_PATH: /data/reports
      MANIFESTS_PATH: /data/manifests
      QUARANTINE_PATH: /data/quarantine
      LOG_PATH: /data/logs
      TMP_PATH: /data/tmp
      CONFIG_PATH: /config
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-}
      DB_USER: ${DB_USER:-}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_CONNECT_TIMEOUT_SECONDS: ${DB_CONNECT_TIMEOUT_SECONDS:-3}
    volumes:
      - ${HOST_IMMICH_STORAGE_PATH:-../data/mock/immich-library}:/mnt/immich/storage:ro
      - ${HOST_BACKUP_TARGET_PATH:-../data/mock/backups}:/mnt/backups/immich
      - ${HOST_REPORTS_PATH:-../data/reports}:/data/reports
      - ${HOST_MANIFESTS_PATH:-../data/manifests}:/data/manifests
      - ${HOST_QUARANTINE_PATH:-../data/quarantine}:/data/quarantine
      - ${HOST_LOG_PATH:-../data/logs}:/data/logs
      - ${HOST_TMP_PATH:-../data/tmp}:/data/tmp
      - ${HOST_CONFIG_PATH:-../config}:/config:ro
    command: ["sh", "-c", "python -m immich_doctor runtime validate && exec tail -f /dev/null"]
